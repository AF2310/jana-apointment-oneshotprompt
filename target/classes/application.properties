# ============================================================================
# Spring Boot Application Configuration
# Appointment Booking System
# ============================================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=30m

# Application Name
spring.application.name=appointment-booking-system

# ============================================================================
# Database Configuration
# ============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_booking_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# Thymeleaf Configuration
# ============================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================================
# Security Configuration
# ============================================================================
admin.auth.username=${APP_ADMIN_USERNAME:admin}
admin.auth.password=${APP_ADMIN_PASSWORD:}
admin.auth.max-failed-attempts=5
admin.auth.lock-minutes=15
admin.auth.session-minutes=30
security.jwt.secret=${APP_JWT_SECRET:}
security.jwt.expiration=86400000

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.booking.appointment=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/appointment-booking.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================================================
# Application-Specific Configuration
# ============================================================================

# Appointment Settings
appointment.default-range-days=40
appointment.default-slot-duration-minutes=15
appointment.max-appointments-per-day=32
appointment.allow-same-day-booking=true
appointment.timezone=UTC

# Email Configuration (for notifications)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================================
# Actuator Configuration (for monitoring)
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
