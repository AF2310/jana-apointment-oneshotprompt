<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Appointment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section h3 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .date-time-picker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .available-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .time-slot {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .time-slot:hover {
            border-color: #667eea;
            background-color: #f5f7fd;
        }

        .time-slot.selected {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .time-slot.disabled {
            background-color: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .info-box {
            background-color: #e3f2fd;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .form-row, .date-time-picker, .available-slots {
                grid-template-columns: 1fr;
            }

            .available-slots {
                grid-template-columns: repeat(3, 1fr);
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Book Your Appointment</h1>
            <p>Reserve your preferred date and time</p>
        </div>

        <div class="success-message" id="successMessage"></div>

        <form id="bookingForm">
            <!-- Personal Information Section -->
            <div class="form-section">
                <h3>Your Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" maxlength="50" pattern="[A-Za-z\s'-]{2,50}" required>
                        <div class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" maxlength="50" pattern="[A-Za-z\s'-]{2,50}" required>
                        <div class="error-message"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" maxlength="120" required>
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" maxlength="15" pattern="\d{10,15}">
                    <div class="error-message"></div>
                </div>
            </div>

            <!-- Vehicle Information Section -->
            <div class="form-section">
                <h3>Vehicle Information</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="make">Make *</label>
                        <input type="text" id="make" name="make" maxlength="50" required>
                        <div class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="model">Model *</label>
                        <input type="text" id="model" name="model" maxlength="50" required>
                        <div class="error-message"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="year">Year *</label>
                        <input type="number" id="year" name="year" min="1900" max="2099" required>
                        <div class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="color">Color</label>
                        <input type="text" id="color" name="color" maxlength="30">
                    </div>
                </div>

                <div class="form-group">
                    <label for="licensePlate">License Plate *</label>
                    <input type="text" id="licensePlate" name="licensePlate" placeholder="e.g., ABC123" maxlength="20" pattern="[A-Za-z0-9-]{3,20}" required>
                    <div class="error-message"></div>
                </div>
            </div>

            <!-- Appointment Scheduling Section -->
            <div class="form-section">
                <h3>Appointment Details</h3>

                <div class="info-box">
                    ℹ️ Available appointments within the next 40 days. Slots are 15 minutes each.
                </div>

                <div class="form-group">
                    <label for="appointmentDate">Preferred Date *</label>
                    <input type="date" id="appointmentDate" name="appointmentDate" required>
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="appointmentTime">Preferred Time *</label>
                    <div class="available-slots" id="timeSlots">
                        <p style="grid-column: 1/-1; text-align: center; color: #999;">
                            Select a date to view available times
                        </p>
                    </div>
                    <input type="hidden" id="appointmentTime" name="appointmentTime">
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="notes">Additional Notes</label>
                    <textarea id="notes" name="notes" maxlength="500" placeholder="Any special requirements or information..."></textarea>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">📋 Book Appointment</button>
                <button type="reset" class="btn-reset">🔄 Clear Form</button>
            </div>
        </form>
    </div>

    <script>
        // Form submission handler
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate form
            if (!validateForm()) {
                return;
            }

            // Show success message (in real app, submit to server)
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = '✅ Appointment booked successfully! You will receive a confirmation email.';
            successMsg.style.display = 'block';
            
            // Reset form after 3 seconds
            setTimeout(() => {
                this.reset();
                successMsg.style.display = 'none';
            }, 3000);
        });

        // Date change handler
        document.getElementById('appointmentDate').addEventListener('change', function() {
            loadAvailableTimeSlots(this.value);
        });

        // Validate form
        function validateForm() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const appointmentDate = document.getElementById('appointmentDate').value;
            const appointmentTime = document.getElementById('appointmentTime').value;

            if (!firstName || !lastName || !email) {
                alert('Please fill in all required personal information');
                return false;
            }

            if (!/^[A-Za-z\s'-]{2,50}$/.test(firstName) || !/^[A-Za-z\s'-]{2,50}$/.test(lastName)) {
                alert('Names must be 2-50 characters and contain only letters, spaces, apostrophes, or hyphens');
                return false;
            }

            if (!email.match(/^[^@]+@[^@]+\.[^@]+$/)) {
                alert('Please enter a valid email address');
                return false;
            }

            if (!appointmentDate || !appointmentTime) {
                alert('Please select both appointment date and time');
                return false;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const selectedDate = new Date(appointmentDate + 'T00:00:00');
            if (selectedDate < today) {
                alert('Appointment date cannot be in the past');
                return false;
            }

            return true;
        }

        // Load available time slots for selected date
        function loadAvailableTimeSlots(date) {
            const slotsDiv = document.getElementById('timeSlots');
            
            // Mock data - in real app, fetch from server
            const timeSlots = [
                '09:00', '09:15', '09:30', '09:45',
                '10:00', '10:15', '10:30', '10:45',
                '11:00', '11:15', '11:30', '11:45',
                '13:00', '13:15', '13:30', '13:45',
                '14:00', '14:15', '14:30', '14:45',
                '15:00', '15:15', '15:30', '15:45',
                '16:00', '16:15', '16:30', '16:45',
                '17:00', '17:15', '17:30', '17:45'
            ];

            slotsDiv.innerHTML = '';
            timeSlots.forEach(time => {
                const button = document.createElement('div');
                button.className = 'time-slot';
                button.textContent = time;
                button.style.cursor = 'pointer';
                button.addEventListener('click', function() {
                    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                    this.classList.add('selected');
                    document.getElementById('appointmentTime').value = time;
                });
                slotsDiv.appendChild(button);
            });
        }
    </script>
</body>
</html>
